<style>

<body class="bg-mesh min-h-screen flex items-center justify-center p-container-margin font-body-md text-on-surface">
<!-- Login Shell Suppression: Per instructions, TopAppBar and BottomNavBar are hidden for transactional screens -->
<main class="w-full max-w-[480px] relative">
<!-- Soft Healthcare Decorative Element (Illustration Placement) -->
<div class="absolute -top-24 -left-12 w-48 h-48 opacity-20 pointer-events-none animate-pulse">
<img alt="" class="w-full h-full object-contain" data-alt="A soft, abstract medical illustration featuring organic, flowing shapes in pale blue and white. The aesthetic is minimalist and empathetic, representing healthcare technology with a gentle, calm-tech feel. The lighting is diffused and high-key, avoiding harsh shadows to maintain a clean and trustworthy medical atmosphere." src="https://lh3.googleusercontent.com/aida-public/AB6AXuC7-9l-zxottRE0TfT3kr-mmjzKffzdcYS4xxG-LvjCkNDTFuJncshI9So8AlyAjWAIugpnrxP1PvcKQJclOgusCwWYZ9M6Sah7DVyuvAuNlwyQZi_eCgL3Zhq1AeQMoe03ZDIOzzBCYlyVzAO73LdqyFPwM4NHu_od8xmfDU5QAX4np4RTFDP5GKKOi9RLfEDrBgS3irfGlQl513rftRBL2KK_iJ4LXnm-1iQqEeoyJ96O_LojErUMoz130koWDykJO4Ky4stGiRc"/>
</div>
<!-- Auth Card -->
<div class="glass-card blue-glow rounded-[24px] p-card-padding shadow-[0_4px_20px_rgba(0,0,0,0.06)] border border-white/50">
<!-- Brand Header -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center w-14 h-14 bg-primary-fixed rounded-xl text-primary mb-4">
<span class="material-symbols-outlined !text-3xl">settings_input_component</span>
</div>
<h1 class="font-display-lg-mobile md:font-display-lg text-display-lg-mobile md:text-display-lg text-on-surface tracking-tight mb-2">Smart Glove</h1>
<p class="font-body-md text-on-surface-variant">Precision assistive technology at your fingertips.</p>
</div>
<!-- Login Form -->
<form action="#" class="space-y-6" onsubmit="event.preventDefault();">
<!-- Email Input -->
<div class="space-y-2">
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase ml-1" for="email">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined">mail</span>
</div>
<input class="w-full min-h-[56px] pl-12 pr-4 bg-surface-container-low border-2 border-transparent rounded-xl focus:border-primary focus:bg-white focus:ring-0 transition-all duration-200 outline-none placeholder:text-outline" id="email" name="email" placeholder="name@example.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase ml-1" for="password">Password</label>
<a class="text-label-caps text-primary hover:underline transition-all" href="#">Forgot?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined">lock</span>
</div>
<input class="w-full min-h-[56px] pl-12 pr-12 bg-surface-container-low border-2 border-transparent rounded-xl focus:border-primary focus:bg-white focus:ring-0 transition-all duration-200 outline-none placeholder:text-outline" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-4 flex items-center text-outline hover:text-on-surface-variant" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Login Button -->
<button class="w-full min-h-[56px] bg-primary text-on-primary font-headline-sm text-headline-sm rounded-xl shadow-lg shadow-primary/20 hover:bg-primary-container active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2" type="submit">
                    Login
                    <span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
<!-- Social/Alternative Login -->
<div class="mt-8 pt-8 border-t border-outline-variant/30 text-center">
<p class="font-label-caps text-label-caps text-on-surface-variant mb-4 uppercase">Or continue with</p>
<div class="flex gap-4">
<button class="flex-1 min-h-[56px] border-2 border-outline-variant/30 rounded-xl hover:bg-surface-container-high transition-all flex items-center justify-center gap-2 font-headline-sm text-headline-sm text-on-surface">
<img alt="G" class="w-5 h-5 opacity-50" data-alt="A simple, clean geometric icon representing a global technology provider, styled in a minimalist and corporate visual language to fit a medical-grade user interface. The icon is rendered in a soft gray to maintain low visual weight within the overall blue-toned color palette." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDkeCqm-ecJ4fzaRFHeL0OKZ2hZwBvmiTXr12SPZMfZNWPPLL0WvCiStNFM88t6ppYmaRexdiCzIbxL7FHq8ZH65ugXlf6RdOFWBr740YDIGYeIt7pJWK0HMXg7vqurlzVhy1J9v-iBQbupvRYCBGy1lQyx9l-pJATOwJ_4V23xDF_4DWgYRKfk5ynq7sQYKJ_l8JSvLGJZFnbSsGKRa8xEKitC4DrRgqr-w3awAJYoiqA7pGZovb2B7yoU5a0537Tc96FO71Z6TOg"/>
                        Google
                    </button>
</div>
</div>
</div>
<!-- Footer CTA -->
<div class="mt-8 text-center">
<p class="text-on-surface-variant font-body-md">
                New to Smart Glove? 
                <a class="text-primary font-bold hover:underline ml-1" href="#">Create Account</a>
</p>
</div>
<!-- Pulse Illustration Overlay -->
<div class="absolute -bottom-20 -right-16 w-64 h-64 opacity-20 pointer-events-none transform rotate-12">
<img alt="" class="w-full h-full object-contain" data-alt="A sophisticated waveform visualization or medical pulse line illustration, rendered in a translucent vibrant blue. The style is modern and glassmorphic, suggesting real-time data monitoring and health tracking technology. It floats subtly in the background, adding to the calm-tech aesthetic of the healthcare interface." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBY1Jix-PWUkyeUXL4aDNVD9Z_7M5CQ9p6H8eXcG1Ga23_jy5zM915S320YQNY3_NJYWp-YumelD--xn83QoIaLWVOkCNfEtJn361CFoiDYozINXvE9tLWRVt0_oDqzjgVCu5bI80L696e5KqMl4kpIIJSpYvi3BDPIxubpK1SIENJC63XwoZ7LGgou7N8YrZt4r96sTbwFkktr5SsEfD4bOTpAQHSmeGLFJVgdR0pKB6JkZTt2HxMWOIWuOIuh3Es7TVnJQcZlGk4"/>
</div>
</main>
<!-- Micro-interaction Script -->
<script>
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('mousedown', () => {
                button.style.transform = 'scale(0.97)';
            });
            button.addEventListener('mouseup', () => {
                button.style.transform = '';
            });
            button.addEventListener('mouseleave', () => {
                button.style.transform = '';
            });
        });

        // Simple password toggle logic
        const toggleBtn = document.querySelector('button .material-symbols-outlined:contains("visibility")');
        if (toggleBtn) {
            toggleBtn.parentElement.addEventListener('click', () => {
                const input = document.getElementById('password');
                const icon = toggleBtn;
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.textContent = 'visibility_off';
                } else {
                    input.type = 'password';
                    icon.textContent = 'visibility';
                }
            });
        }
    </script>
</body></html>
