<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        @keyframes pulse-glow {
            0%, 100% { filter: drop-shadow(0 0 15px rgba(0, 74, 198, 0.2)); opacity: 0.8; }
            50% { filter: drop-shadow(0 0 40px rgba(0, 74, 198, 0.5)); opacity: 1; }
        }

        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        .animate-pulse-glow {
            animation: pulse-glow 4s ease-in-out infinite;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        body {
            background: radial-gradient(circle at top left, #faf8ff 0%, #d4e3ff 100%);
            min-height: 100vh;
            overflow: hidden;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);

<body class="flex flex-col items-center justify-between py-16 px-container-margin transition-opacity duration-1000 ease-in-out" id="splash-body">
<!-- Top Branding -->

<div class="w-12 h-12 bg-primary flex items-center justify-center rounded-2xl shadow-lg transition-transform hover:scale-110 active:scale-95 duration-200">

<span class="font-headline-sm text-headline-sm-mobile md:text-headline-sm text-primary font-bold tracking-tight">Smart Glove</span>
</div>
</header>
<!-- Main Content: Floating Illustration -->
<main class="relative flex flex-col items-center justify-center w-full max-w-lg">
<!-- Pulse Glow Backdrop -->
<div class="absolute w-64 h-64 bg-primary-fixed-dim/30 rounded-full blur-[80px] animate-pulse-glow z-0"></div>
<!-- Illustration Container -->
<div class="relative z-10 animate-float flex flex-col items-center">
<div class="relative w-72 h-72 md:w-96 md:h-96">
<!-- Data-Alt Prompt Embedded Here -->
<img alt="Assistive Smart Glove Illustration" class="w-full h-full object-contain filter drop-shadow-2xl" data-alt="A futuristic assistive smart glove rendered in a minimalist, clean 3D style. The glove is made of high-tech white synthetic fibers with soft blue glowing sensors at the knuckles and fingertips. It is suspended in a bright, ethereal studio setting with a soft blue and white gradient background that feels medical and advanced. Soft, ambient lighting creates gentle highlights on the glove's surface, conveying a sense of calm tech and compassionate design." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDaDp0kxZF6-Q00lnm_lYn8NvaSFhjAbYDQSn3C6DDYoVnWN3zutTmgIWS6bmZITS-IpsOLucvMVDdWxGxYoBzthX4ytJJIKiYPHPoWgZe7wDOyQQ9vkU3KNzhdt18XYgA104EC6_qv6h3RwPVLSGIsV5Tso32Zs5kHU2sTl_WUVcF2fkXxt0V-y-La9MlDljGIup6o7YuNJERWagSJFIyFenVII08xhGIaRQDiw1WJx4ZMJ6j6L19KL2QyNM72knEB6Wz3GPcfeSc"/>
<!-- Floating Sensor Indicators -->
<div class="absolute top-1/4 -right-4 glass-card p-3 rounded-2xl shadow-xl flex items-center space-gap-2">
<span class="material-symbols-outlined text-secondary text-xl" data-icon="auto_awesome">auto_awesome</span>
<span class="font-label-caps text-label-caps text-on-surface-variant ml-2">Active Calibration</span>
</div>
</div>
</div>

<!-- Bottom Text & CTA -->
<footer class="w-full max-w-md flex flex-col items-center text-center space-y-8 mb-12">
<div class="space-y-3">
<h1 class="font-display-lg-mobile md:font-display-lg text-display-lg-mobile md:text-display-lg text-on-background">Assistive Smart Glove</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-xs mx-auto">Empowering independence through technology</p>
</div>
<div class="w-full space-y-6">
<!-- Progress Indicator -->
<div class="w-full h-1.5 bg-surface-container-highest rounded-full overflow-hidden relative">
<div class="absolute left-0 top-0 h-full bg-primary rounded-full transition-all duration-[3000ms] ease-out" id="progress-bar" style="width: 0%"></div>
</div>
<button class="group relative w-full h-[56px] bg-primary text-white font-headline-sm rounded-full shadow-lg overflow-hidden hover:bg-secondary active:scale-[0.98] transition-all duration-300" onclick="navigate()">
<div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/10 to-transparent translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-1000"></div>
<span class="relative z-10 flex items-center justify-center space-x-2">

<span class="material-symbols-outlined text-white animate-spin" data-icon="sync" style="font-size: 20px;">sync</span>
</span>
</button>

<span class="material-symbols-outlined text-primary" data-icon="bluetooth_connected" style="font-size: 18px;">bluetooth_connected</span>

</div>
<div class="flex items-center space-x-2">
<span class="material-symbols-outlined text-primary" data-icon="verified_user" style="font-size: 18px;">verified_user</span>
<span class="font-label-caps text-[12px] text-on-surface-variant">Medical Certified</span>
</div>
</div>

<script>
        // Simulate initialization progress
        window.addEventListener('DOMContentLoaded', () => {
            const bar = document.getElementById('progress-bar');
            setTimeout(() => {
                bar.style.width = '100%';
            }, 100);

            // Subtle mouse tracking glow effect
            document.addEventListener('mousemove', (e) => {
                const glow = document.querySelector('.animate-pulse-glow');
                const x = (e.clientX / window.innerWidth - 0.5) * 40;
                const y = (e.clientY / window.innerHeight - 0.5) * 40;
                glow.style.transform = `translate(${x}px, ${y}px)`;
            });
        });

        function navigate() {
            const body = document.getElementById('splash-body');
            body.style.opacity = '0';
            setTimeout(() => {
                // In a real app, this would route to the Home or Onboarding screen
                console.log('Navigating to Home...');
                // For demonstration, reset opacity
                setTimeout(() => body.style.opacity = '1', 500);
            }, 800);
        }
    </script>
