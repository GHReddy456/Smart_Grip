<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Atkinson+Hyperlegible+Next:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glow-hand {
            filter: drop-shadow(0 0 12px rgba(0, 74, 198, 0.6));
            animation: pulse-glow 2s infinite ease-in-out;
        }
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.02); }
        }
        .scan-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, #2563eb, transparent);
            box-shadow: 0 0 15px #2563eb;
            animation: scan-move 3s infinite linear;
        }
        @keyframes scan-move {
            0% { top: 20%; }
            100% { top: 80%; }
        }
        .corner-bracket {
            width: 40px;
            height: 40px;
            border-color: #2563eb;
            position: absolute;
        }
        .glass-panel {
            background: rgba(25, 27, 35, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-fixed": "#ffdbcd",
                        "on-surface-variant": "#434655",
                        "primary": "#004ac6",
                        "background": "#faf8ff",
                        "on-tertiary-fixed": "#360f00",

                        "on-secondary-container": "#003c70",

                        "primary-fixed-dim": "#b4c5ff",
                        "on-error-container": "#93000a",
                        "secondary-container": "#64a8fe",
                        "primary-fixed": "#dbe1ff",
                        "surface": "#faf8ff",
                        "secondary": "#0060ac",
                        "surface-container-high": "#e7e7f3",
                        "error": "#ba1a1a",
                        "inverse-surface": "#2e3039",
                        "on-secondary-fixed-variant": "#004883",
                        "on-tertiary": "#ffffff",
                        "surface-container-low": "#f3f3fe",
                        "tertiary-fixed-dim": "#ffb596",
                        "surface-container-highest": "#e1e2ed",
                        "surface-variant": "#e1e2ed",
                        "on-tertiary-fixed-variant": "#7d2d00",
                        "on-background": "#191b23",
                        "on-error": "#ffffff",
                        "surface-bright": "#faf8ff",
                        "on-primary-fixed": "#00174b",
                        "surface-tint": "#0053db",
                        "on-primary-container": "#eeefff",
                        "inverse-primary": "#b4c5ff",
                        "on-surface": "#191b23",
                        "tertiary": "#943700",
                        "on-secondary-fixed": "#001c39",
                        "error-container": "#ffdad6",
                        "secondary-fixed": "#d4e3ff",
                        "on-primary": "#ffffff",
                        "surface-dim": "#d9d9e5",
                        "secondary-fixed-dim": "#a4c9ff",
                        "primary-container": "#2563eb"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "container-margin": "24px",
                        "touch-target-min": "56px",
                        "card-padding": "24px",
                        "unit": "8px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "headline-md": ["manrope"],
                        "body-lg": ["atkinsonHyperlegibleNext"],
                        "display-lg": ["manrope"],
                        "headline-sm": ["manrope"],
                        "body-md": ["atkinsonHyperlegibleNext"],
                        "label-caps": ["atkinsonHyperlegibleNext"],
                        "display-lg-mobile": ["manrope"]
                    },
                    "fontSize": {
                        "headline-md": ["28px", {"lineHeight": "1.3", "fontWeight": "600"}],
                        "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "display-lg": ["36px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "headline-sm": ["22px", {"lineHeight": "1.3", "fontWeight": "600"}],
                        "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "label-caps": ["14px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "700"}],
                        "display-lg-mobile": ["32px", {"lineHeight": "1.2", "fontWeight": "700"}]
                    }
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-surface antialiased overflow-hidden h-screen w-full">
<div class="relative h-full w-full bg-black overflow-hidden">

<div class="absolute inset-0 bg-black/40 z-10 pointer-events-none"></div>
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-container-margin h-[64px] bg-surface/80 dark:bg-surface-dim/80 backdrop-blur-md border-b border-outline-variant/30 shadow-sm">
<button class="w-10 h-10 flex items-center justify-center rounded-full active:scale-95 transition-transform">
<span class="material-symbols-outlined text-primary">close</span>
</button>
<h1 class="font-headline-sm text-headline-sm-mobile md:text-headline-sm text-primary font-bold tracking-tight">Smart Glove Scan</h1>
<div class="w-10 h-10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary">info</span>
</div>
</header>
<div class="absolute top-[80px] left-0 w-full z-40 px-container-margin">
<div class="flex items-center gap-2 overflow-x-auto py-2 no-scrollbar">
<div class="flex items-center gap-2 bg-primary text-on-primary px-4 py-2 rounded-full whitespace-nowrap">
<span class="material-symbols-outlined text-[18px]">check_circle</span>
<span class="font-label-caps text-label-caps">Wrist Scan</span>
</div>
<div class="w-4 h-[1px] bg-outline-variant shrink-0"></div>
<div class="flex items-center gap-2 bg-primary-container text-on-primary-container px-4 py-2 rounded-full whitespace-nowrap ring-2 ring-primary">

</div>
<div class="w-4 h-[1px] bg-outline-variant shrink-0"></div>
<div class="flex items-center gap-2 bg-surface/40 text-on-surface-variant px-4 py-2 rounded-full whitespace-nowrap backdrop-blur-md border border-white/20">
<span class="material-symbols-outlined text-[18px]">circle</span>
<span class="font-label-caps text-label-caps">Fingers</span>
</div>
</div>
</div>
<div class="absolute inset-0 z-20 flex items-center justify-center">
<div class="relative w-[280px] h-[400px] md:w-[320px] md:h-[480px]">
<div class="corner-bracket top-0 left-0 border-t-4 border-l-4 rounded-tl-3xl"></div>
<div class="corner-bracket top-0 right-0 border-t-4 border-r-4 rounded-tr-3xl"></div>
<div class="corner-bracket bottom-0 left-0 border-b-4 border-l-4 rounded-bl-3xl"></div>
<div class="corner-bracket bottom-0 right-0 border-b-4 border-r-4 rounded-br-3xl"></div>
<div class="absolute inset-0 flex items-center justify-center opacity-50 glow-hand">
<span class="material-symbols-outlined text-[200px] md:text-[260px] text-primary" style="font-variation-settings: 'FILL' 0, 'wght' 100;">back_hand</span>
</div>
<div class="absolute left-[-20px] top-1/2 -translate-y-1/2 flex flex-col gap-8 opacity-60">
<div class="w-1 h-8 bg-primary-fixed rounded-full"></div>
<div class="w-2 h-12 bg-primary rounded-full"></div>
<div class="w-1 h-8 bg-primary-fixed rounded-full"></div>
</div>
<div class="scan-line absolute w-full z-30"></div>
</div>
</div>
<div class="absolute top-[20%] left-1/2 -translate-x-1/2 z-30 text-center pointer-events-none">
<div class="glass-panel px-6 py-3 rounded-full border border-white/20 shadow-xl">
<p class="font-body-md text-body-md text-white font-medium flex items-center gap-2">
<span class="material-symbols-outlined text-primary-container">reset_focus</span>
                    Align your hand with the guide
                </p>
</div>
</div>
<div class="fixed bottom-0 left-0 w-full z-50 p-container-margin pb-safe">
<div class="glass-panel p-6 rounded-[32px] border border-white/10 shadow-2xl flex flex-col gap-4">
<div class="flex items-center justify-between mb-2">
<div class="flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-primary animate-pulse"></div>
<span class="font-label-caps text-label-caps text-white/80 uppercase">Precision Focus: 94%</span>
</div>
<span class="font-label-caps text-label-caps text-white/60">RIGHT HAND</span>
</div>
<div class="flex gap-4">
<button class="flex-1 min-h-touch-target-min rounded-full border-2 border-white/20 text-white font-headline-sm text-[16px] active:scale-95 transition-all flex items-center justify-center gap-2 hover:bg-white/10">
<span class="material-symbols-outlined">refresh</span>
                        Retake
                    </button>
<button class="flex-[2] min-h-touch-target-min rounded-full bg-primary text-white font-headline-sm text-[16px] shadow-lg shadow-primary/30 active:scale-95 transition-all flex items-center justify-center gap-2 font-bold">
                        Continue
                        <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</div>
</div>
<div class="absolute bottom-[200px] left-1/2 -translate-x-1/2 z-30 opacity-40">
<div class="flex items-end gap-1 h-12">
<div class="w-1 bg-primary rounded-full animate-[bounce_1s_infinite_0ms]" style="height: 40%"></div>
<div class="w-1 bg-primary rounded-full animate-[bounce_1s_infinite_100ms]" style="height: 70%"></div>
<div class="w-1 bg-primary rounded-full animate-[bounce_1s_infinite_200ms]" style="height: 100%"></div>
<div class="w-1 bg-primary rounded-full animate-[bounce_1s_infinite_300ms]" style="height: 60%"></div>
<div class="w-1 bg-primary rounded-full animate-[bounce_1s_infinite_400ms]" style="height: 80%"></div>
</div>
</div>
</div>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const scanLine = document.querySelector('.scan-line');
            const statusGlow = document.querySelector('.animate-pulse');
            
            setInterval(() => {
                const percent = Math.floor(Math.random() * (98 - 92 + 1) + 92);
                const precisionText = document.querySelector('.uppercase');
                if(precisionText) precisionText.innerText = `Precision Focus: ${percent}%`;
            }, 2000);
        });
    </script>
