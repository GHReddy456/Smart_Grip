<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .scanner-glow {
            box-shadow: 0 0 30px rgba(0, 74, 198, 0.15);
        }
        .selection-active {
            border: 3px solid #004ac6;
            box-shadow: 0 0 40px rgba(0, 74, 198, 0.3);
            transform: scale(1.02);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1); opacity: 0.3; }
            100% { transform: scale(0.95); opacity: 0.5; }
        }
        .animate-pulse-slow {
            animation: pulse-ring 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
<script id="tailwind-config">

            theme: {

                        "primary": "#004ac6",
                        "background": "#faf8ff",

                        "on-tertiary-container": "#ffede6",

                        "surface-container-high": "#e7e7f3",
                        "error": "#ba1a1a",
                        "inverse-surface": "#2e3039",
                        "on-secondary-fixed-variant": "#004883",
                        "on-tertiary": "#ffffff",
                        "surface-container-low": "#f3f3fe",
                        "tertiary-fixed-dim": "#ffb596",
                        "surface-container-highest": "#e1e2ed",
                        "surface-variant": "#e1e2ed",
                        "on-tertiary-fixed-variant": "#7d2d00",
                        "on-background": "#191b23",
                        "on-error": "#ffffff",
                        "surface-bright": "#faf8ff",
                        "on-primary-fixed": "#00174b",
                        "surface-tint": "#0053db",
                        "on-primary-container": "#eeefff",
                        "inverse-primary": "#b4c5ff",
                        "on-surface": "#191b23",
                        "tertiary": "#943700",
                        "on-secondary-fixed": "#001c39",
                        "error-container": "#ffdad6",
                        "secondary-fixed": "#d4e3ff",
                        "on-primary": "#ffffff",
                        "surface-dim": "#d9d9e5",
                        "secondary-fixed-dim": "#a4c9ff",
                        "primary-container": "#2563eb"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "container-margin": "24px",
                        "touch-target-min": "56px",
                        "card-padding": "24px",
                        "unit": "8px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "headline-md": ["manrope"],
                        "body-lg": ["atkinsonHyperlegibleNext"],
                        "display-lg": ["manrope"],
                        "headline-sm": ["manrope"],
                        "body-md": ["atkinsonHyperlegibleNext"],
                        "label-caps": ["atkinsonHyperlegibleNext"],

                    },
                    "fontSize": {
                        "headline-md": ["28px", {"lineHeight": "1.3", "fontWeight": "600"}],
                        "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "display-lg": ["36px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "headline-sm": ["22px", {"lineHeight": "1.3", "fontWeight": "600"}],
                        "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "label-caps": ["14px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "700"}],
                        "display-lg-mobile": ["32px", {"lineHeight": "1.2", "fontWeight": "700"}]
                    }
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body-md min-h-screen flex flex-col">
<!-- Top Navigation Anchor (As specified in JSON hierarchy) -->
<header class="fixed top-0 w-full z-50 bg-surface/80 dark:bg-surface-dim/80 backdrop-blur-md border-b border-outline-variant/30 shadow-sm transition-all duration-300">
<div class="flex items-center justify-between px-container-margin h-[64px] w-full max-w-7xl mx-auto">
<div class="flex items-center gap-3">
<button aria-label="Go back" class="p-2 -ml-2 rounded-full hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="font-headline-sm text-headline-sm-mobile md:text-headline-sm font-bold text-primary tracking-tight">Smart Glove</h1>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-on-surface-variant">account_circle</span>
</div>
</div>
</header>
<main class="flex-grow pt-24 pb-12 px-container-margin flex flex-col items-center justify-center max-w-5xl mx-auto w-full">
<!-- Header Section -->
<div class="text-center mb-12 animate-fade-in">
<h2 class="font-display-lg-mobile md:font-display-lg text-display-lg-mobile md:text-display-lg text-on-surface mb-4">
                Which hand should we build the glove for?
            </h2>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-2xl mx-auto">
                We will customize the glove specifically for this hand to ensure maximum comfort and precision in your daily tasks.
            </p>
</div>
<!-- Selection Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-gutter w-full md:px-12">
<!-- Left Hand Card -->
<button class="group relative flex flex-col items-center p-card-padding rounded-[24px] bg-surface-container-lowest border-2 border-transparent transition-all duration-500 scanner-glow hover:shadow-xl active:scale-95 text-center overflow-hidden min-h-[380px]" id="card-left" onclick="selectHand('left')">
<div class="absolute inset-0 bg-primary/5 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
<!-- 3D Illustration Placeholder -->
<div class="relative w-full aspect-square max-w-[240px] mb-8 flex items-center justify-center">
<div class="absolute inset-0 rounded-full bg-primary/10 animate-pulse-slow"></div>
<img alt="Left Hand Diagram" class="w-full h-full object-contain mix-blend-multiply relative z-10" data-alt="A highly detailed 3D digital rendering of a left human hand in a relaxed, open posture, glowing with translucent blue energy lines and anatomical markers. The aesthetic is clean, medical, and futuristic, set against a soft white studio background with ambient blue light reflections that match a premium health-tech design system." src="https://lh3.googleusercontent.com/aida-public/AB6AXuC-8erfF2cjZ0s7pNddR6kZtZv8JwMM6auXcWRZXTzXOWbfnHb4Rld_8aPjxAx8HklRcMVkM_uO161MH1BTtaFchwqn21SYRVyMYQ2jqlJuyr_1CC-4MhpPxzZyQWqikHGoA_TktHHQrPi6Wngt7wxgqsjGQaP4z5Ttr3qj1fR26WSKfkRTC7UIDhYNRvHpKQ6hrxvjEdi-9juJzKNY7b89fXZujke8RgGYxIyH3I_VRYKikS5WtATayrCYAXxXtRXT1cbiG9E4HQ8"/>
<!-- Scanner Lines Effect -->
<div class="absolute top-0 left-0 w-full h-[2px] bg-primary shadow-[0_0_15px_#004ac6] opacity-0 group-hover:animate-bounce group-hover:opacity-100 z-20"></div>
</div>
<h3 class="font-headline-md text-headline-md text-on-surface mb-2">Left Hand</h3>
<p class="font-body-md text-on-surface-variant">Optimized for left-hand dominant sensors</p>
<!-- Selection Indicator -->
<div class="mt-auto pt-6">
<div class="w-10 h-10 rounded-full border-2 border-outline-variant flex items-center justify-center transition-all duration-300 group-hover:border-primary" id="check-left">
<span class="material-symbols-outlined text-primary scale-0 transition-transform duration-300">check</span>
</div>
</div>
</button>
<!-- Right Hand Card -->
<button class="group relative flex flex-col items-center p-card-padding rounded-[24px] bg-surface-container-lowest border-2 border-transparent transition-all duration-500 scanner-glow hover:shadow-xl active:scale-95 text-center overflow-hidden min-h-[380px]" id="card-right" onclick="selectHand('right')">
<div class="absolute inset-0 bg-primary/5 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
<!-- 3D Illustration Placeholder -->
<div class="relative w-full aspect-square max-w-[240px] mb-8 flex items-center justify-center">
<div class="absolute inset-0 rounded-full bg-primary/10 animate-pulse-slow"></div>
<img alt="Right Hand Diagram" class="w-full h-full object-contain mix-blend-multiply relative z-10" data-alt="A futuristic 3D digital visualization of a right human hand reaching forward, featuring glowing blue skeletal mapping and biometric scanning overlays. The scene is illuminated by soft, high-key white lighting, creating a serene and sophisticated calm-tech environment consistent with advanced medical assistive technology." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAzYMppMnONV70qDhplMCxFsmH5ROkmP2rM4TsPXNDawbbhHAzKEy3tfcrjwzeelfW2_LYDbRo4FzQ1JhMvX9uLLOxjF77ka_rfCGAxuG8kuCjc_JvAlR4_46erw2li933EIORl6zyZZ8On3zWUGjg7Y_zOLoZGyX9ttonH24OUZjJ8CHLMrjQ8sOfvXW2p8l3iXzhsslD1nLNoKfIBMCcUub-rALuFwi9A54htcLSNP4sPTVLCO_gRPZNtVIxTpZRkJ_9UnPY7lSQ"/>
<!-- Scanner Lines Effect -->
<div class="absolute top-0 left-0 w-full h-[2px] bg-primary shadow-[0_0_15px_#004ac6] opacity-0 group-hover:animate-bounce group-hover:opacity-100 z-20"></div>
</div>
<h3 class="font-headline-md text-headline-md text-on-surface mb-2">Right Hand</h3>
<p class="font-body-md text-on-surface-variant">Optimized for right-hand dominant sensors</p>
<!-- Selection Indicator -->
<div class="mt-auto pt-6">
<div class="w-10 h-10 rounded-full border-2 border-outline-variant flex items-center justify-center transition-all duration-300 group-hover:border-primary" id="check-right">
<span class="material-symbols-outlined text-primary scale-0 transition-transform duration-300">check</span>
</div>
</div>
</button>
</div>
<!-- Action Button -->
<div class="mt-12 w-full max-w-sm">
<button class="w-full h-[56px] bg-primary/40 text-on-primary rounded-full font-headline-sm font-bold shadow-lg flex items-center justify-center gap-3 transition-all duration-300 cursor-not-allowed" disabled="" id="continue-btn">
<span>Continue Configuration</span>
<span class="material-symbols-outlined">chevron_right</span>
</button>
<p class="text-center mt-4 text-on-surface-variant font-label-caps opacity-60">Selection is required to proceed</p>
</div>
</main>
<!-- Visual Polish: Background Gradients -->
<div class="fixed top-0 left-0 w-full h-full -z-10 overflow-hidden pointer-events-none">
<div class="absolute top-[-10%] right-[-10%] w-[50%] h-[50%] bg-primary/5 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[40%] h-[40%] bg-secondary-container/10 blur-[100px] rounded-full"></div>
</div>
<script>
        function selectHand(hand) {
            const leftCard = document.getElementById('card-left');
            const rightCard = document.getElementById('card-right');
            const leftCheck = document.getElementById('check-left');
            const rightCheck = document.getElementById('check-right');
            const continueBtn = document.getElementById('continue-btn');

            // Reset
            leftCard.classList.remove('selection-active');
            rightCard.classList.remove('selection-active');
            leftCheck.querySelector('span').classList.add('scale-0');
            rightCheck.querySelector('span').classList.add('scale-0');
            leftCheck.classList.replace('bg-primary-fixed', 'bg-transparent');
            rightCheck.classList.replace('bg-primary-fixed', 'bg-transparent');

            // Set active
            if (hand === 'left') {
                leftCard.classList.add('selection-active');
                leftCheck.querySelector('span').classList.remove('scale-0');
                leftCheck.classList.add('bg-primary-fixed');
                leftCheck.classList.remove('border-outline-variant');
                leftCheck.classList.add('border-primary');
            } else {
                rightCard.classList.add('selection-active');
                rightCheck.querySelector('span').classList.remove('scale-0');
                rightCheck.classList.add('bg-primary-fixed');
                rightCheck.classList.remove('border-outline-variant');
                rightCheck.classList.add('border-primary');
            }

            // Enable Continue
            continueBtn.disabled = false;
            continueBtn.classList.remove('bg-primary/40', 'cursor-not-allowed');
            continueBtn.classList.add('bg-primary', 'hover:shadow-xl', 'active:scale-95');
        }
    </script>
</body></html>
