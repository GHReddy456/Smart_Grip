<script>
        // Simple micro-interaction for the progress bar simulation
        document.addEventListener('DOMContentLoaded', () => {
            const progressBar = document.querySelector('.bg-primary.rounded-full');
            const progressText = document.querySelector('.text-primary.font-bold');
            let progress = 42;
            
            setInterval(() => {
                if(progress < 99) {
                    progress += Math.floor(Math.random() * 2);
                    progressBar.style.width = `${progress}%`;
                    progressText.textContent = `${progress}%`;
                }
            }, 3000);
        });
    </script>
