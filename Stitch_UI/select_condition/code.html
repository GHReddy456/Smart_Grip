<script>
        function selectCondition(card) {
            // Remove selection from all cards
            document.querySelectorAll('.condition-card').forEach(c => {
                c.classList.remove('card-selected');
                c.classList.add('bg-surface-container-lowest');
            });

            // Add selection to clicked card
            card.classList.add('card-selected');
            card.classList.remove('bg-surface-container-lowest');

            // Enable continue button
            const continueBtn = document.getElementById('continue-btn');
            continueBtn.disabled = false;
            continueBtn.classList.remove('bg-primary/40', 'cursor-not-allowed');
            continueBtn.classList.add('bg-primary', 'shadow-lg', 'shadow-primary/20', 'hover:bg-primary-fixed-variant');

            // Tactile feedback simulated by scale reduction handled by CSS active:scale-95
        }
    </script>
