<script>
        // Waveform Animation Logic
        const container = document.getElementById('waveform-container');
        const barCount = 40;
        const bars = [];

        for (let i = 0; i < barCount; i++) {
            const bar = document.createElement('div');
            bar.className = 'waveform-bar w-1 bg-primary-container rounded-full';
            bar.style.height = '20%';
            container.appendChild(bar);
            bars.push(bar);
        }

        function updateWaveform() {
            bars.forEach(bar => {
                const height = 20 + Math.random() * 60;
                bar.style.height = `${height}%`;
                bar.style.opacity = (height / 100) + 0.2;
            });
            requestAnimationFrame(() => setTimeout(updateWaveform, 100));
        }
        updateWaveform();

        // Countdown Logic
        let count = 3;
        const timerVal = document.getElementById('timer-val');
        const countdownOverlay = document.getElementById('countdown');

        const timer = setInterval(() => {
            count--;
            if (count > 0) {
                timerVal.innerText = count;
            } else if (count === 0) {
                timerVal.innerText = "START";
                timerVal.classList.add('text-secondary');
            } else {
                countdownOverlay.classList.add('opacity-0');
                setTimeout(() => countdownOverlay.style.display = 'none', 300);
                clearInterval(timer);
            }
        }, 1000);
    </script>
